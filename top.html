    <div class="top_wraper main-img">
        <div class="header_inner">
            <div class="title-log">
                <img src="./img/img_logo_black.svg" alt="Kon">
            </div>
            <nav class="top-nav">
                <ul class="menu_lists">
                    <li class="menu_list"><a href="">TOP</a></li>

    <div class="concept">
        <div class="concept_title section_title">こだわり</div>

        <div class="concept-inner">
            <img class="concept_img" src="./img/img_sara.svg" alt="340x340の皿の画像">
            <div class="concept-text">
                <h3 class="concept-text_title">
                    この土地で育った野菜と、<br>
                    この土地に暮らす人々と。
                </h3>
                <p>
                    Konでは地元でとれた食材を使用しています。食材そのものの旨味を引き<br>
                    出し、一品一品に生産者さんの想いや、つくり手であるオーナーシェフの<br>
                    情熱を注いで皆様に提供させていただいております。<br>
                    創業以来12年、皆様に愛され続けてきた味をお楽しみください。
                </p>
            </div>
        </div>
    </div>
